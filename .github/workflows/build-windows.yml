name: Build Windows App

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build Windows app folder
        run: pnpm dist

      - name: Verify runnable app exists
        shell: pwsh
        run: |
          if (!(Test-Path "release/win-unpacked/Image Creator.exe")) {
            throw "Expected release/win-unpacked/Image Creator.exe to exist"
          }

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-creator-windows-x64-unpacked
          path: |
            release/win-unpacked/**
          if-no-files-found: error
